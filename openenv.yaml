name: aare
description: Autonomous Application Resilience Environment for training agents to defend web applications against cyber attacks.



entrypoint: env.aare_env:AAREEnv

tasks:

  - name: easy
    module: tasks.easy:EasyTask
    grader: graders.grader:AAREGrader

  - name: medium
    module: tasks.medium:MediumTask
    grader: graders.grader:AAREGrader

  - name: hard
    module: tasks.hard:HardTask
    grader: graders.grader:AAREGrader

version: 0.1