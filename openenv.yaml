spec_version: 1
name: aare
type: space
runtime: fastapi
app: server.app:app
port: 7860
entrypoint: env.aare_env:AAREEnv
version: "0.1"
description: Autonomous Application Resilience Environment for training agents to defend web applications against cyber attacks.

tasks:
